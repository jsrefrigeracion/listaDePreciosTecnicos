name: Deploy static site to GitHub Pages

on:
  push:
    branches:
      - main  # o la rama desde la que quieras desplegar
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Si necesitás construir los archivos (por ejemplo con npm run build)
      # descomentá estas líneas:
      # - name: Setup Node.js
      #   uses: actions/setup-node@v4
      #   with:
      #     node-version: 20
      # - name: Build project
      #   run: |
      #     npm ci
      #     npm run build

      - name: Upload build folder
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist  # 👈 esta es la carpeta que se va a publicar

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
